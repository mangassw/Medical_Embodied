# MPPI Controller (ROS1 端口) 参数：参考 nav2_mppi_controller 默认配置
# 注意：本文件将参数加载到 /move_base_flex/mppi_controller 命名空间，供 MBF 插件读取
mppi_controller:
  controller_frequency: 10.0
  # 运动约束与速度采样
  enable: true                       # 启用控制器
  vx_max: 0.5                        # 最大前向速度(m/s)
  vy_max: 0.0                        # 最大横向速度(m/s)，差速一般为0
  vx_min: 0.0                        # 最小前向速度(m/s)，禁止倒退
  wz_max: 2.5                        # 最大角速度(rad/s)，提高掉头响应
  ax_max: 1.5                        # 最大线加速度(m/s^2)
  ax_min: -1.5                       # 最小线加速度(m/s^2)
  ay_max: 1.5                        # 最大横向加速度(m/s^2)
  az_max: 2.0                        # 最大角加速度(rad/s^2)
  vx_std: 0.1                        # 线速度采样噪声
  vy_std: 0.1                        # 横向速度采样噪声
  wz_std: 0.2                        # 角速度采样噪声

  # 目标容差与停止判据
  xy_goal_tolerance: 0.15            # 位置目标容差(m)
  yaw_goal_tolerance: 0.25           # 航向目标容差(rad)
  theta_stopped_vel: 0.1             # 角速度停止阈值(rad/s)
  trans_stopped_vel: 0.05             # 线速度停止阈值(m/s)

  # Ackermann 约束（如非阿克曼可保留默认）
  ackermann_constraints_min_turning_r: 0.0  # 最小转弯半径(m)

  # 约束代价(平滑)
  constrain_cost_power: 1            # 代价幂次
  constrain_cost_weight: 8.0         # 约束权重

  # 代价地图避障
  cost_power: 1                      # 代价幂次
  cost_weight: 50.0                  # 代价权重(内部会做归一化)
  cost_critical_cost: 100.0          # 关键代价值阈值
  cost_collision_cost: 1000000.0     # 碰撞代价
  cost_near_goal_distance: 0.2       # 靠近目标时减弱避障距离(m)
  cost_inflation_layer_name: ""      # 指定膨胀层名称(空=自动)
  cost_trajectory_point_step: 2      # 轨迹采样步进
  cost_consider_footprint: true      # 是否考虑足迹

  # 目标角度代价
  goal_angle_cost_power: 1
  goal_angle_cost_weight: 3.0
  goal_angle_threshold_to_consider: 0.5

  # 目标距离代价
  goal_cost_power: 1
  goal_cost_weight: 5.0
  goal_threshold_to_consider: 1.4

  # 障碍物代价
  obstacles_consider_footprint: true
  obstacles_cost_power: 1
  obstacles_repulsion_weight: 3.0
  obstacles_critical_weight: 50.0
  obstacles_collision_cost: 200000.0
  obstacles_collision_margin_distance: 0.0
  obstacles_near_goal_distance: 0.5
  obstacles_inflation_layer_name: ""  # 指定膨胀层名称(空=自动)

  # 路径对齐代价
  path_align_offset_from_furthest: 20
  path_align_trajectory_point_step: 4
  path_align_threshold_to_consider: 0.5
  path_align_max_path_occupancy_ratio: 0.07
  path_align_use_path_orientations: false
  path_align_cost_power: 1
  path_align_cost_weight: 10.0

  # 路径角度代价
  path_angle_offset_from_furthest: 4
  path_angle_cost_power: 1
  path_angle_cost_weight: 2.2
  path_angle_max_angle_to_furthest: 0.785398
  path_angle_threshold_to_consider: 0.5
  path_angle_mode: 0

  # 路径跟随代价
  path_follow_cost_power: 1
  path_follow_cost_weight: 10.0
  path_follow_threshold_to_consider: 1.4
  path_follow_offset_from_furthest: 6

  # 前进偏好代价
  prefer_forward_cost_power: 1
  prefer_forward_cost_weight: 50.0
  prefer_forward_threshold_to_consider: 0.3

  # 旋转惩罚代价
  twirling_cost_power: 1
  twirling_cost_weight: 6.0

  # 速度死区代价
  velocity_deadband_cost_power: 1
  velocity_deadband_cost_weight: 35.0
  velocity_deadband_velocities_1: 0.0
  velocity_deadband_velocities_2: 0.0
  velocity_deadband_velocities_3: 0.0

  # 路径处理
  path_handler_max_robot_pose_search_dist: 1.5
  path_handler_prune_distance: 1.5
  path_handler_transform_tolerance: 0.1
  path_handler_enforce_path_inversion: false
  path_handler_inversion_xy_tolerance: 0.2
  path_handler_inversion_yaw_tolerance: 0.4

  # 轨迹可视化
  trajectory_visualizer_visualize: true
  trajectory_visualizer_trajectory_step: 10
  trajectory_visualizer_time_step: 3

  # 噪声生成器
  noise_generator_regenerate_noises: false

  # 优化器参数
  optimizer_model_dt: 0.1
  optimizer_time_steps: 56
  optimizer_batch_size: 1000
  optimizer_iteration_count: 1
  optimizer_temperature: 0.3
  optimizer_gamma: 0.02
  optimizer_retry_attempt_limit: 1
  optimizer_motion_model: "DiffDrive"

  # 代价函数列表（字符串以逗号分隔）
  critic_manager_critics: "PathAlignCritic,PathFollowCritic,PreferForwardCritic,GoalCritic,GoalAngleCritic,PathAngleCritic,TwirlingCritic,CostCritic,ConstraintCritic,VelocityDeadbandCritic"




