# 5-26：优化footprint为正确的机器人模型
# 5-27：降低膨胀层的膨胀半径0.8->0.4，启用全局和局部的障碍物层，修改局部的global_frame:map->odom
# 6-18: 使用机器人朝后的模型，修改相关模型参数，使用3dscan（暂时不使用keepout_layer）
global_costmap:
  plugins:
    - { name: static_layer,    type: "costmap_2d::StaticLayer" }
    - { name: obstacle_layer,  type: "costmap_2d::ObstacleLayer" }
    - { name: inflation_layer, type: "costmap_2d::InflationLayer" }

  track_unknown_space: false
  global_frame: map
  robot_base_frame: base_link
  map_type: costmap
  footprint: [[0.28, 0.26], [0.28, -0.26], [-0.28, -0.26], [-0.28, 0.26]]
  # robot_radius: 0.25          # 点机器人：用 robot_radius，0 表示点
  footprint_padding: 0.03    # 非零会等效扩大足迹(若需“纯点”，设为0)

  update_frequency: 1.0
  publish_frequency: 1.0
  transform_tolerance: 0.5

  static_map: true
  always_send_full_costmap: false
  resolution: 0.05

  static_layer:
    map_topic: map
    track_unknown_space: false

  obstacle_layer:
    observation_sources: 3dscan
    3dscan: { sensor_frame: lidar_3d_link, data_type: PointCloud2, topic: livox/points, obstacle_range: 3.0, raytrace_range: 3.5, marking: true, clearing: true, min_obstacle_height: 0.2, max_obstacle_height: 1.0 }
    track_unknown_space: false

  inflation_layer:
    inflation_radius: 0.4
    cost_scaling_factor: 2.61

local_costmap:
  plugins:
    - { name: obstacle_layer,  type: "costmap_2d::ObstacleLayer" }
    - { name: inflation_layer, type: "costmap_2d::InflationLayer" }

  global_frame: map
  robot_base_frame: base_link
  map_type: costmap
  footprint: [[0.28, 0.26], [0.28, -0.26], [-0.28, -0.26], [-0.28, 0.26]]
  # robot_radius: 0.25          # 点机器人：用 robot_radius，0 表示点
  footprint_padding: 0.03

  update_frequency: 10.0
  publish_frequency: 5.0
  transform_tolerance: 0.5

  static_map: false
  rolling_window: true
  width: 6
  height: 6
  resolution: 0.05

  obstacle_layer:
    observation_sources: 3dscan
    3dscan: { sensor_frame: lidar_3d_link, data_type: PointCloud2, topic: livox/points, obstacle_range: 3.0, raytrace_range: 3.5, marking: true, clearing: true, min_obstacle_height: 0.2, max_obstacle_height: 1.5 }
    track_unknown_space: false

  inflation_layer:
    inflation_radius: 0.4
    cost_scaling_factor: 2.0


