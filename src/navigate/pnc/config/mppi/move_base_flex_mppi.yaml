planners:
  - name: GlobalPlanner
    type: global_planner/GlobalPlanner

controllers:
  - name: mppi_controller
    type: mppi_controller_ros/MPPIControllerROS

planner_frequency: 0.0
planner_patience: 5.0
planner_max_retries: 1

controller_frequency: 10.0
controller_patience: 2.0
controller_max_retries: 1

recovery_enabled: true
recovery_patience: 30.0

oscillation_timeout: 10.0
oscillation_distance: 0.5

force_stop_at_goal: true
controller_lock_costmap: false
